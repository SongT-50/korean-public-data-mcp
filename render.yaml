services:
  - type: web
    name: korean-public-data-mcp
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: DATA_GO_KR_API_KEY
        sync: false
      - key: ECOS_API_KEY
        sync: false
      - key: PORT
        value: "8080"
      - key: MCP_TRANSPORT
        value: "streamable-http"
